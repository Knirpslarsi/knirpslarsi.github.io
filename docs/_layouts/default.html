<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - Knirpslarsi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #111111;
            --bg-secondary: #1a1a1a;
            --accent-purple: #a855f7;
            --accent-purple-light: #c084fc;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --border-color: #2a2a2a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            line-height: 1.6;
            color: var(--text-primary);
            background-color: var(--bg-dark);
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(17, 17, 17, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
        }

        nav .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-purple);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        nav .links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        nav .links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.3s ease;
            position: relative;
        }

        nav .links a:hover {
            color: var(--accent-purple);
        }

        nav .links a.active {
            color: var(--accent-purple);
        }

        nav .links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent-purple);
            transition: width 0.3s ease;
        }

        nav .links a:hover::after,
        nav .links a.active::after {
            width: 100%;
        }

        /* Main Content */
        main {
            padding-top: 80px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Hero Section */
        .hero {
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4rem 2rem;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.15) 0%, transparent 70%);
            border-radius: 50%;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: 10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 800px;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 700;
            margin-bottom: 1.5rem;
            letter-spacing: -1.5px;
            line-height: 1.2;
        }

        .hero-highlight {
            background: linear-gradient(135deg, var(--accent-purple) 0%, var(--accent-purple-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 1.15rem;
            color: var(--text-secondary);
            margin-bottom: 3rem;
            line-height: 1.8;
            font-weight: 300;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.875rem 2rem;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            border: 2px solid var(--accent-purple);
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: var(--accent-purple);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-purple-light);
            border-color: var(--accent-purple-light);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(168, 85, 247, 0.2);
        }

        .btn-secondary {
            background: transparent;
            color: var(--accent-purple);
        }

        .btn-secondary:hover {
            background: rgba(168, 85, 247, 0.1);
            border-color: var(--accent-purple-light);
            color: var(--accent-purple-light);
            transform: translateY(-2px);
        }

        /* Content Sections */
        section {
            padding: 6rem 2rem;
            border-bottom: 1px solid var(--border-color);
        }

        section h2 {
            font-size: 2.5rem;
            margin-bottom: 3rem;
            text-align: center;
            font-weight: 700;
            letter-spacing: -0.5px;
            position: relative;
            padding-bottom: 2rem;
        }

        section h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--accent-purple), transparent);
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(168, 85, 247, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .card:hover {
            border-color: var(--accent-purple);
            transform: translateY(-5px);
            background: rgba(168, 85, 247, 0.05);
        }

        .card:hover::before {
            left: 100%;
        }

        .card h3 {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            color: var(--accent-purple);
            position: relative;
            z-index: 1;
        }

        .card p {
            color: var(--text-secondary);
            line-height: 1.7;
            font-weight: 300;
            position: relative;
            z-index: 1;
        }

        /* Text Content */
        .text-content {
            max-width: 800px;
            margin: 0 auto;
        }

        .text-content h3 {
            font-size: 1.3rem;
            margin: 2rem 0 1rem 0;
            color: var(--accent-purple);
        }

        .text-content p {
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 1.5rem;
            font-weight: 300;
        }

        .text-content ul {
            margin-left: 2rem;
            margin-bottom: 1.5rem;
        }

        .text-content li {
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            font-weight: 300;
        }

        .text-content li::marker {
            color: var(--accent-purple);
        }

        /* About Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin: 3rem 0;
        }

        .stat-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-box:hover {
            border-color: var(--accent-purple);
            transform: translateY(-3px);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-purple);
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: var(--text-secondary);
            font-weight: 300;
        }

        /* Footer */
        footer {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            padding: 2rem;
            text-align: center;
            color: var(--text-secondary);
            font-weight: 300;
        }

        /* Responsive */
        @media (max-width: 768px) {
            nav .links {
                gap: 1rem;
            }

            nav .links a {
                font-size: 0.85rem;
            }

            .hero h1 {
                font-size: 2rem;
            }

            section {
                padding: 4rem 1rem;
            }

            section h2 {
                font-size: 1.8rem;
            }

            .btn-group {
                flex-direction: column;
                align-items: center;
            }

            .btn {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
<nav>
    <div class="container">
        <a href="/" class="logo">K.</a>
        <ul class="links">
            <li><a href="/" class="{% if page.url == '/' %}active{% endif %}">Home</a></li>
            <li><a href="/about" class="{% if page.url == '/about.html' or page.url == '/about/' %}active{% endif %}">About</a></li>
            <li><a href="/projects" class="{% if page.url == '/projects.html' or page.url == '/projects/' %}active{% endif %}">Projects</a></li>
        </ul>
    </div>
</nav>

<main>
    {{ content }}
</main>

<footer>
    <p>&copy; 2026 Knirpslarsi. Crafted with care.</p>
</footer>
</body>
</html>
